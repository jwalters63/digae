<!DOCTYPE html>
<html>
<head><title>Admin Login</title></head>
<body>
    <h2>Login Admin</h2>
    <input type="text" id="email" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">
    <button type="button" onclick="login()">Entrar</button>
    <p id="msg"></p>
    
    <script>
    async function login() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        try {
            const res = await fetch('http://localhost:8081/api/v1/auth/login', {
                method: 'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({email:e, password:p})
            });
            if(res.ok) {
                const data = await res.json();
                localStorage.setItem('token', data.token);
                window.location.href = 'dashboard.html';
            } else {
                const err = await res.json();
                document.getElementById('msg').innerText = "Error: " + err.message;
            }
        } catch(e) {
            document.getElementById('msg').innerText = "Error de conexión";
        }
    }
    </script>
</body>
</html>
