<!DOCTYPE html>
<html>
<head><title>Admin Dashboard</title></head>
<body>
    <h2>Registro de Usuarios</h2>

    <label>Nombre:</label> <input type="text" id="nombre"><br>
    <label>Apellido:</label> <input type="text" id="apellido"><br>
    <label>Usuario:</label> <input type="text" id="email"><br>
    <label>Contraseña:</label> <input type="password" id="password"><br>

    <label>Rol:</label> 
    <select id="rol" onchange="toggleFacultad()">
        <option value="ADMINISTRADOR">Root Admin (Acceso Total)</option>
        <option value="USUARIO_OPERATIVO">Usuario (Solo su facultad)</option>
    </select><br>

    <div id="facultadDiv" style="display:none;">
        <label>Facultad:</label> 
        <select id="facultadId">
            <option value="1">Facultad de Ingeniería (FI)</option>
        </select>
    </div><br>

    <button type="button" onclick="registrar()">Crear Usuario</button>
    <button type="button" onclick="logout()">Cerrar Sesión</button>
    <p id="msg"></p>

    <script>

    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    }

    function toggleFacultad() {
        const r = document.getElementById('rol').value;
        document.getElementById('facultadDiv').style.display = r === 'USUARIO_OPERATIVO' ? 'block' : 'none';
    }

    async function registrar() {
        const payload = {
            nombre: document.getElementById('nombre').value,
            apellido: document.getElementById('apellido').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            rol: document.getElementById('rol').value
        };
        if(payload.rol === 'USUARIO_OPERATIVO') {
            payload.facultadId = parseInt(document.getElementById('facultadId').value);
        }

        try {
            const res = await fetch('http://localhost:8081/api/v1/auth/register', {
                method: 'POST',
                headers:{
                    'Content-Type':'application/json',
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                },
                body: JSON.stringify(payload)
            });
            if(res.ok) {
                document.getElementById('msg').innerText = "¡Registrado!";
            } else {
                const err = await res.json().catch(()=>({message:"Error desconocido"}));
                document.getElementById('msg').innerText = "Error: " + err.message;
            }
        } catch(e) {
            document.getElementById('msg').innerText = "Error de red";
        }
    }
    </script>
</body>
</html>
