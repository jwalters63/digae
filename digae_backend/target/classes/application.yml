# ============================================================
# DIGAE SGA - Configuración de Aplicación
# ============================================================

server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: digae-sga-api

  # ---- Datasource (PostgreSQL / Supabase) ----
  datasource:
    url: jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:5432/postgres?user=postgres.nbzmudakwosrgfxzynlx&password=R4CNeedAcog***
    username: postgres.nbzmudakwosrgfxzynlx
    password: R4CNeedAcog***
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  # ---- JPA / Hibernate ----
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: America/Mexico_City
    open-in-view: false

  # ---- Jackson ----
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: America/Mexico_City
    default-property-inclusion: non_null

# ---- Logging ----
logging:
  level:
    com.digae.sga: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
